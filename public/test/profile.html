<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <title>Profil</title>
</head>

<body>

    <canvas id="stars"></canvas>
    <nav class="navbar">
        <div class="theme-toggle" onclick="toggleTheme()">
            <div id="icon">🌙</div>
        </div>

        <!--kozep-->
        <div class="nav-center">
            <div class="nav-center">
                <div class="image-container">
                    <a href="index.html"><img src="./kepek/tabla.png" alt="Faliújság" class="register-image"></a>
                </div>
            </div>
        </div>

        <!--jobb-->
        <div class="nav-right" id="navRight"></div>
    </nav>




    <div class="container">
        <div class="profile-page">

            <!-- PROFILE CARD -->
            <div class="profile-card">

                <div class="profile-header">
                    <img id="profileImage" src="https://i.pravatar.cc/120" alt="Profile picture">

                    <div class="profile-header-actions">
                        <button type="button" id="editProfileBtn" onclick="enableEditMode()">Profil szerkesztése</button>
                        <button type="button" id="cancelEditProfileBtn" onclick="cancelEditMode()"
                            style="display:none;">Mégsem</button>
                    </div>
                </div>

                <div class="profile-info">

                    <div class="profile-row">
                        <label>Profilkép URL</label>
                        <input type="text" id="profilePicture" disabled>
                    </div>

                    <div class="profile-row">
                        <label>E-mail</label>
                        <input type="email" id="email" disabled>
                    </div>

                    <div class="profile-row">
                        <label>Felhasználónév</label>
                        <input type="text" id="username" disabled>
                    </div>

                    <div class="profile-row">
                        <label>Iskola</label>
                        <input type="text" id="school" disabled>
                    </div>

                    <div class="profile-row">
                        <label>Bemutatkozás</label>
                        <textarea id="bio" disabled maxlength="300"
                            placeholder="Írj pár mondatot magadról..."></textarea>
                    </div>

                    <button class="save-profile" id="saveProfileBtn" onclick="saveProfile()" style="display:none;">
                        Változtatások mentése
                    </button>
                </div>

                <hr class="divider">

                <div class="profile-info">
                    <h3>Jelszó változtatás</h3>

                    <div class="profile-row">
                        <label>Jelenlegi jelszó</label>
                        <div class="password-box">
                            <input type="password" id="currentPassword">
                            <button type="button" onclick="togglePassword('currentPassword')">👁️</button>
                        </div>
                    </div>

                    <div class="profile-row">
                        <label>Új jelszó</label>
                        <div class="password-box">
                            <input type="password" id="newPassword">
                            <button type="button" onclick="togglePassword('newPassword')">👁️</button>
                        </div>
                    </div>

                    <div class="profile-row">
                        <label>Új jelszó újra</label>
                        <div class="password-box">
                            <input type="password" id="newPasswordConfirm">
                            <button type="button" onclick="togglePassword('newPasswordConfirm')">👁️</button>
                        </div>
                    </div>

                    <button class="save-profile" onclick="savePassword()">
                        Jelszó megváltoztatása
                    </button>
                </div>


                <!-- USER POSTS -->
                <div class="profile-posts">
                    <div class="profile-tabs">
                        <button type="button" class="profile-tab active" onclick="setProfileView('posts')">
                            Posztjaim
                        </button>
                        <button type="button" class="profile-tab" onclick="setProfileView('comments')">
                            Kommentjeim
                        </button>
                        <button type="button" class="profile-tab" onclick="setProfileView('saved')">
                            Mentett posztok
                        </button>
                    </div>

                    <div id="profileContent"></div>

                    <div class="pagination" id="profilePagination">
                        <button type="button" id="profilePrevPageBtn">Előző</button>
                        <span id="profilePageInfo">1 / 1</span>
                        <button type="button" id="profileNextPageBtn">Következő</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- PROFILE POST MODAL -->
    <div class="modal" id="profilePostModal" onclick="closeProfilePostModal(event)">
        <div class="modal-content">
            <h2 id="profileModalTitle"></h2>
            <p id="profileModalAuthor"></p>
            <p id="profileModalDesc"></p>
            <hr>
            <div id="profileModalComments"></div>

            <div class="comment-box" id="profileCommentBox">
                <textarea id="profileNewCommentText" placeholder="Írj kommentet..."></textarea>
                <button onclick="submitProfileComment()">Küldés</button>
            </div>
        </div>
    </div>

    <!-- EDIT POST MODAL -->
    <div class="modal" id="editPostModal" onclick="closeEditPostModal(event)">
        <div class="modal-content create-modal">
            <h2>Poszt szerkesztése</h2>

            <input type="text" id="editPostTitle" placeholder="Cím" />
            <textarea id="editPostDescription" placeholder="Leírás"></textarea>

            <div class="form-actions">
                <button type="button" onclick="closeEditPostModal()">Vissza</button>
                <button type="button" onclick="saveEditedPost()">Mentés</button>
            </div>

            <p class="error" id="editPostError"></p>
        </div>
    </div>
    <a href="index.html" class="back-home-btn">← Főoldal</a>
    <script src="./js/profil.js"></script>
</body>

</html>
