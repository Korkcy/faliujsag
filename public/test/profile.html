<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <title>Profil</title>
</head>

<body>

    <canvas id="stars"></canvas>
    <nav class="navbar">
        <div class="nav-center">
            <button onclick="setFeed('home')"><a href="index.html">Home</a></button>
            <button onclick="setFeed('following')">Following</button>
        </div>

        <div class="nav-right">
            <button class="notif-btn">🔔</button>

            <div class="profile">
                <img src="https://i.pravatar.cc/40" onclick="toggleDropdown()" />
                <div class="dropdown" id="dropdown">
                    <div><a href="profile.html" id="profil">Profile</a></div>
                    <div>Settings</div>

                    <div class="dark-toggle">
                        Dark mode
                        <label class="switch">
                            <input type="checkbox" id="darkToggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </nav>



    <div class="container">
    <div class="profile-page">

        <!-- PROFILE CARD -->
        <div class="profile-card">

            <div class="profile-header">
                <img id="profileImage" src="https://i.pravatar.cc/120">
                <input type="file" id="imageUpload" accept="image/*" hidden>

                <button onclick="document.getElementById('imageUpload').click()">
                    Change photo
                </button>
            </div>

            <div class="profile-info">

                <div class="profile-row">
                    <label>Email</label>
                    <input type="email" id="email">
                </div>

                <div class="profile-row">
                    <label>Username</label>
                    <input type="text" id="username">
                </div>

                <div class="profile-row">
                    <label>Password</label>
                    <div class="password-box">
                        <input type="password" id="password">
                        <button onclick="togglePassword('confirm')">👁️</button>
                    </div>
                </div>

                <div class="profile-row">
                    <label>School</label>
                    <input type="text" id="school">
                </div>

                <button class="save-profile" onclick="saveProfile()">
                    Save changes
                </button>

            </div>
        </div>


        <!-- USER POSTS -->
        <div class="profile-posts">
            <h2>Your posts</h2>
            <div id="userPosts"></div>
        </div>

    </div>
</div>



    <script src="./js/profil.js"></script>
</body>

</html>
