<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <title>Profil</title>
</head>

<body>

    <canvas id="stars"></canvas>
    <nav class="navbar">
    <div class="theme-toggle" onclick="toggleTheme()">
      <div id="icon">🌙</div>
    </div>

    <!--kozep-->
    <div class="nav-center">
      <div class="nav-center">
        <div class="image-container">
          <a href="index.html"><img src="./kepek/tabla.png" alt="Faliújság" class="register-image"></a>
        </div>
      </div>
    </div>

    <!--jobb-->
    <div class="nav-right" id="navRight"></div>
  </nav>




    <div class="container">
    <div class="profile-page">

        <!-- PROFILE CARD -->
        <div class="profile-card">

            <div class="profile-header">
                <img id="profileImage" src="https://i.pravatar.cc/120">
                
                <input type="text" id="profile-pic">
            </div>

            <div class="profile-info">

                <div class="profile-row">
                    <label>Email</label>
                    <input type="email" id="email">
                </div>

                <div class="profile-row">
                    <label>Username</label>
                    <input type="text" id="username">
                </div>

                <div class="profile-row">
                    <label>Password</label>
                    <div class="password-box">
                        <input type="password" id="password">
                        <button onclick="togglePassword('confirm')">👁️</button>
                    </div>
                </div>

                <div class="profile-row">
                    <label>School</label>
                    <input type="text" id="school">
                </div>

                <button class="save-profile" onclick="saveProfile()">
                    Save changes
                </button>

            </div>
        </div>


        <!-- USER POSTS -->
        <div class="profile-posts">
            <h2>Your posts</h2>
            <div id="userPosts"></div>
        </div>

    </div>
</div>



    <script src="./js/profil.js"></script>
</body>

</html>
