<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin panel</title>

  <script>
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.classList.add("dark");
    }
  </script>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="admin.css" />
</head>

<body>
  <canvas id="stars"></canvas>

  <nav class="navbar">
    <div class="theme-toggle" onclick="toggleTheme()">
      <div id="icon">🌙</div>
    </div>

    <div class="nav-center">
      <div class="nav-center">
        <div class="image-container">
          <a href="index.html">
            <img src="./kepek/tabla.png" alt="Faliújság" class="register-image">
          </a>
        </div>
      </div>
    </div>

    <div class="nav-right" id="navRight"></div>
  </nav>

  <div class="container">
    <div class="admin-page">
      <div class="admin-card">

        <div class="admin-header">
          <h2>Admin panel</h2>
          <p id="adminSubtitle">Oldalkezelő felület</p>
        </div>

        <div class="admin-section">
          <div class="admin-tabs">
            <button type="button" class="admin-tab active" onclick="setAdminView('posts')">
              Posztok
            </button>
            <button type="button" class="admin-tab" onclick="setAdminView('comments')">
              Kommentek
            </button>
            <button type="button" class="admin-tab" onclick="setAdminView('users')">
              Felhasználók
            </button>
          </div>

          <div class="admin-search-row" id="adminUserSearchRow" style="display: none;">
            <input type="text" id="adminUserSearchInput" class="admin-search-input"
              placeholder="Keresés felhasználóra..." />
          </div>

          <div id="adminContent"></div>

          <div class="pagination" id="adminPagination">
            <button type="button" id="adminPrevPageBtn">Előző</button>
            <span id="adminPageInfo">1 / 1</span>
            <button type="button" id="adminNextPageBtn">Következő</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script src="./js/admin.js"></script>
</body>

</html>
