<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faliújság</title>
  <script>
    if (localStorage.getItem("theme") === "dark") {
      document.documentElement.classList.add("dark");
    }
  </script>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <canvas id="stars"></canvas>


  <!-- NAVBAR -->

  <!--bal oldal-->
  <nav class="navbar">
    <div class="theme-toggle" onclick="toggleTheme()">
      <div id="icon">🌙</div>
    </div>

    <!--kozep-->
    <div class="nav-center">
      <div class="nav-center">
        <div class="image-container">
          <a href="index.html"><img src="./kepek/tabla.png" alt="Faliújság" class="register-image"></a>
        </div>
      </div>
    </div>

    <!--jobb-->
    <div class="nav-right" id="navRight"></div>
  </nav>

  <!-- SEARCH + FILTER -->
  <div class="top-bar">
    <input type="text" placeholder="Keresés..." class="search-input" id="searchInput" />

    <div class="filters">
      <button type="button" onclick="setSort('newest')">Legújabb</button>
      <button type="button" onclick="setSort('answers')">Legtöbb válasz</button>
      <button type="button" onclick="setSort('rated')">Legjobban értékelt</button>
    </div>
  </div>
  <!-- POSTS -->
  <div class="container">
    <div id="posts"></div>

    <div class="pagination" id="pagination">
      <button type="button" id="prevPageBtn">Előző</button>
      <span id="pageInfo">1 / 1</span>
      <button type="button" id="nextPageBtn">Következő</button>
    </div>
  </div>

  <!-- FLOATING BUTTON -->
  <button class="fab" onclick="openCreateModal()">+</button>

  <!-- CREATE POST MODAL (új rész) -->
  <div class="modal" id="createModal" onclick="closeCreateModal(event)">
    <div class="modal-content create-modal">
      <h2>Poszt létrehozása</h2>

      <input type="text" id="postTitle" placeholder="Cím" />
      <textarea id="postDescription" placeholder="Leírás"></textarea>

      <div class="form-actions">
        <button onclick="closeCreateModal()">Vissza</button>
        <button onclick="createPost()">Létrehozás</button>
      </div>


      <p class="error" id="createError"></p>
    </div>
  </div>

  <!-- MODAL -->
  <div class="modal" id="modal" onclick="closeModal(event)">
    <div class="modal-content">
      <h2 id="modal-title"></h2>
      <p id="modal-author"></p>
      <p id="modal-desc"></p>
      <hr>
      <div id="modal-comments"></div>

      <!--kommentek-->
      <div class="comment-box">
        <textarea id="newCommentText" placeholder="Írj kommentet..."></textarea>
        <button onclick="submitComment()">Küldés</button>
      </div>

      <!--ertekeles-->
      <div class="rating-box">
        <p>Hasznos volt ez a poszt?</p>

        <div class="rating-actions">
          <button onclick="ratePost(true)">👍 Igen</button>
          <button onclick="ratePost(false)">👎 Nem</button>
        </div>

        <div class="rating-number">
          <input type="number" id="ratingScore" min="1" max="10" placeholder="1-10">
          <button onclick="submitRating()">Értékelés</button>
        </div>

        <p id="ratingMessage"></p>
      </div>
    </div>
  </div>

  <script src="./js/index.js"></script>
</body>

</html>
