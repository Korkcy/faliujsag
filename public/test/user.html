<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <title>Felhasználó profilja</title>
</head>

<body>
    <canvas id="stars"></canvas>

    <nav class="navbar">
        <div class="theme-toggle" onclick="toggleTheme()">
            <div id="icon">🌙</div>
        </div>

        <div class="nav-center">
            <div class="nav-center">
                <div class="image-container">
                    <a href="index.html"><img src="./kepek/tabla.png" alt="Faliújság" class="register-image"></a>
                </div>
            </div>
        </div>

        <div class="nav-right" id="navRight"></div>
    </nav>

    <div class="container">
        <div class="profile-page">
            <div class="profile-card">
                <div class="profile-header">
                    <img id="profileImage" src="https://i.pravatar.cc/120" alt="Profile picture">
                </div>

                <div class="profile-info">
                    <div class="profile-row">
                        <label>Felhasználónév</label>
                        <input type="text" id="username" disabled>
                    </div>

                    <div class="profile-row">
                        <label>Iskola</label>
                        <input type="text" id="school" disabled>
                    </div>

                    <div class="profile-row">
                        <label>Bemutatkozás</label>
                        <textarea id="bio" disabled></textarea>
                    </div>
                </div>

                <div class="profile-posts">
                    <h2>Felhasználó posztjai</h2>
                    <div id="userPosts"></div>

                    <div class="pagination" id="userPagination">
                        <button type="button" id="userPrevPageBtn">Előző</button>
                        <span id="userPageInfo">1 / 1</span>
                        <button type="button" id="userNextPageBtn">Következő</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="userPostModal" onclick="closeUserPostModal(event)">
        <div class="modal-content">
            <div class="modal-top-row">
                <h2 id="userModalTitle"></h2>
                <button type="button" id="userModalAdminDeleteBtn" class="admin-delete-btn"
                    onclick="adminDeleteViewedPost(currentViewedPostId, event)" style="display: none;">
                    🔨
                </button>
                <button type="button" id="userModalSaveBtn" class="save-post-btn"
                    onclick="toggleViewedSavedPost(currentViewedPostId, event)">
                    🔖 Mentés
                </button>
            </div>
            <p id="userModalAuthor"></p>
            <p id="userModalDesc"></p>
            <hr>
            <div id="userModalComments"></div>

            <div class="comment-box" id="userCommentBox">
                <textarea id="userNewCommentText" placeholder="Írj kommentet..."></textarea>
                <button onclick="submitUserComment()">Küldés</button>
            </div>

            <div class="rating-box">
                <p>Hasznos volt ez a poszt?</p>

                <div class="rating-actions">
                    <button id="userHelpfulYesBtn" onclick="rateViewedPost(true)">👍 Igen</button>
                    <button id="userHelpfulNoBtn" onclick="rateViewedPost(false)">👎 Nem</button>
                </div>

                <div class="rating-number">
                    <input type="number" id="userRatingScore" min="1" max="10" placeholder="1-10">
                    <button onclick="submitViewedPostRating()">Értékelés</button>
                </div>

                <p id="userRatingMessage"></p>
            </div>
        </div>
    </div>
    <a href="index.html" class="back-home-btn">← Főoldal</a>
    <script src="./js/userProfile.js"></script>
</body>

</html>
