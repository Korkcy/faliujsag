<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <!-- DARK MODE LOAD -->
    <script>
        if (localStorage.getItem("theme") === "dark") {
            document.documentElement.classList.add("dark");
        }
    </script>

    <link rel="stylesheet" href="register.css">
</head>

<body>
    <canvas id="stars"></canvas>

    <!-- DARK MODE TOGGLE -->
    <div class="theme-toggle" onclick="toggleTheme()">
        <div id="icon">🌙</div>
    </div>

    <!-- REGISTER BOX -->
    <div class="register-container">
        <div class="register-box">
            <div class="image-container">
                <img src="./kepek/tabla.png" alt="Faliújság" class="register-image">
            </div>


            <h2>Fiók létrehozása</h2>

            <input type="text" placeholder="Felhasználónév" id="username">
            <input type="email" placeholder="E-mail" id="email">

            <div class="password-field">
                <input type="password" placeholder="Jelszó" id="password">
                <span onclick="togglePassword('password')">👁️</span>
            </div>

            <div class="password-field">
                <input type="password" placeholder="Jelszó újra" id="confirm">
                <span onclick="togglePassword('confirm')">👁️</span>
            </div>

            <button onclick="register()">Regisztráció</button>

            <p>Van már fiókod? <a href="login.html" id="jelentkezz">Jelentkezz be!</a></p>

            <p class="error" id="error"></p>

        </div>
    </div>

    <script src="./js/regisztracio.js"></script>
</body>

</html>
